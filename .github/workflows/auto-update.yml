name: Auto Update OmniRoute

on:
  schedule:
    # 每天凌晨 2 点检查一次
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check.outputs.updated }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 获取上游最新版本 ==="
          LATEST=$(curl -s https://api.github.com/repos/diegosouzapw/OmniRoute/releases/latest | \
            grep '"tag_name"' | head -1 | sed 's/.*"tag_name": "\(.*\)",.*/\1/')
          echo "Latest upstream: $LATEST"

          # 获取当前 Dockerfile 中的版本
          CURRENT=$(grep -oP 'FROM diegosouzapw/omniroute:\K.+' Dockerfile || echo "latest")
          echo "Current deployed: $CURRENT"

          echo "new_version=$LATEST" >> $GITHUB_OUTPUT

          if [ "$LATEST" != "$CURRENT" ] && [ -n "$LATEST" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "🆕 发现新版本: $CURRENT → $LATEST"
          else
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "✅ 已是最新版本"
          fi

  deploy:
    needs: check-update
    if: needs.check-update.outputs.updated == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Dockerfile version
        run: |
          NEW_VERSION="${{ needs.check-update.outputs.new_version }}"
          sed -i "s|FROM diegosouzapw/omniroute:.*|FROM diegosouzapw/omniroute:${NEW_VERSION}|" Dockerfile
          echo "📝 Dockerfile updated to version $NEW_VERSION"

      - name: Commit and push version update
        run: |
          git config user.name "Auto Update Bot"
          git config user.email "update@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: bump OmniRoute to ${{ needs.check-update.outputs.new_version }}"
          git push

      - name: Trigger deploy
        run: |
          echo "🔄 版本更新已推送，deploy.yml 会自动触发部署到 HF Space"