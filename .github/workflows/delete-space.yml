name: Delete HF Space

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "🗑️ 正在删除 HF Space: ZTTYBB/OmniRoute"
          curl -s -X DELETE "https://huggingface.co/api/spaces/ZTTYBB/OmniRoute" \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json"
          echo ""
          echo "✅ 删除完成！"
          echo "Space ZTTYBB/OmniRoute 已被删除。"